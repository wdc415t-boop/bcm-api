# Render.com Blueprint for BeachCombersMania API v2.0

services:
  - type: web
    name: bcm-api
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://marcomania.online,https://naplesmania.online,https://bonitamania.online,https://ftmyersmania.online,https://sanibelmania.online,https://captivamania.online,https://beachcombersmania.online,https://marcomainia.online
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "30"
      - key: JWT_EXPIRES_IN
        value: "30d"
      - key: DB_PATH
        value: "./data/bcm.db"
    healthCheckPath: /api/health
